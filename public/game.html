<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamondnaire - Play</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 15px; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
    }
    .header-title { font-size: 20px; font-weight: bold; }
    .stats-bar {
      display: flex;
      justify-content: space-around;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .stat { text-align: center; }
    .stat-icon { font-size: 20px; }
    .stat-value { font-size: 18px; font-weight: bold; }
    .stat-label { font-size: 10px; color: #aaa; }
    .slot-machine {
      background: linear-gradient(180deg, #2a2a4a 0%, #1a1a2e 100%);
      border-radius: 20px;
      padding: 30px 20px;
      margin-bottom: 20px;
      border: 3px solid #ffd700;
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
    }
    .reels-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .reel {
      width: 80px;
      height: 100px;
      background: linear-gradient(180deg, #fff 0%, #e0e0e0 50%, #fff 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border: 3px solid #333;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }
    .reel.spinning {
      animation: spin 0.1s infinite;
    }
    @keyframes spin {
      0% { transform: translateY(-5px); }
      100% { transform: translateY(5px); }
    }
    .result-message {
      text-align: center;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      min-height: 60px;
      color: #ffd700;
    }
    .bet-section {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .bet-title {
      text-align: center;
      margin-bottom: 15px;
      color: #aaa;
    }
    .bet-options {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .bet-btn {
      padding: 10px 15px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }
    .bet-btn.active {
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      border-color: #ffd700;
      color: #1a1a2e;
      font-weight: bold;
    }
    .bet-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .spin-btn {
      width: 100%;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      border: none;
      border-radius: 15px;
      color: #1a1a2e;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .spin-btn:hover { transform: scale(1.02); }
    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .ice-bar {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .ice-title {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .ice-progress {
      height: 20px;
      background: #333;
      border-radius: 10px;
      overflow: hidden;
    }
    .ice-fill {
      height: 100%;
      background: linear-gradient(90deg, #00b4db, #0083b0);
      transition: width 0.5s;
    }
    .ice-fill.frozen {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      cursor: pointer;
    }
    .tab.active {
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      color: #1a1a2e;
    }
    .leaderboard-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 15px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
      margin-bottom: 10px;
    }
    .rank { font-size: 24px; width: 40px; }
    .player-info { flex: 1; }
    .player-name { font-weight: bold; }
    .player-games { font-size: 12px; color: #aaa; }
    .player-score { color: #ffd700; font-size: 18px; }
    .medal { font-size: 24px; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="back-btn" onclick="goBack()">←</button>
      <div class="header-title">💎 Diamondnaire</div>
      <button class="back-btn" onclick="showHome()">🏠</button>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('game')">🎰 Game</div>
      <div class="tab" onclick="showTab('leaderboard')">🏆 Leaderboard</div>
    </div>


    <div id="game-tab">
      <div class="stats-bar">
        <div class="stat">
          <div class="stat-icon">💲</div>
          <div class="stat-value" id="balance">0</div>
          <div class="stat-label">Balance</div>
        </div>
        <div class="stat">
          <div class="stat-icon">💎</div>
          <div class="stat-value" id="diamonds">0</div>
          <div class="stat-label">Diamonds</div>
        </div>
        <div class="stat">
          <div class="stat-icon">🏅</div>
          <div class="stat-value" id="points">0</div>
          <div class="stat-label">Points</div>
        </div>
        <div class="stat">
          <div class="stat-icon">🎟️</div>
          <div class="stat-value" id="tickets">0</div>
          <div class="stat-label">Tickets</div>
        </div>
      </div>


      <div class="ice-bar">
        <div class="ice-title">
          <span>🧊 Machine Freeze</span>
          <span id="ice-percent">0%</span>
        </div>
        <div class="ice-progress">
          <div class="ice-fill" id="ice-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="slot-machine">
        <div class="reels-container">
          <div class="reel" id="reel1">💎</div>
          <div class="reel" id="reel2">👑</div>
          <div class="reel" id="reel3">💀</div>
        </div>
        <div class="result-message" id="result-message">Good Luck! 🎰</div>
      </div>

      <div class="bet-section">
        <div class="bet-title">Select Bet Multiplier</div>
        <div class="bet-options">
          <button class="bet-btn active" data-mult="1" onclick="setBet(1)">x1</button>
          <button class="bet-btn" data-mult="3" onclick="setBet(3)">x3</button>
          <button class="bet-btn" data-mult="5" onclick="setBet(5)">x5</button>
          <button class="bet-btn" data-mult="9" onclick="setBet(9)">x9</button>
          <button class="bet-btn" data-mult="15" onclick="setBet(15)">x15</button>
          <button class="bet-btn" data-mult="25" onclick="setBet(25)">x25</button>
          <button class="bet-btn" data-mult="50" onclick="setBet(50)">x50</button>
          <button class="bet-btn" data-mult="100" onclick="setBet(100)">x100</button>
        </div>
      </div>

      <button class="spin-btn" id="spin-btn" onclick="spin()">🎰 SPIN 🎰</button>
    </div>

    <div id="leaderboard-tab" class="hidden">
      <div class="leaderboard-list" id="leaderboard-list"></div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    let userData = null;
    let currentBet = 1;
    const API_URL = 'https://diamondnaire.onrender.com';
    const TICKET_MULTIPLIERS = [1, 3, 5, 9, 15, 25, 50, 100];
    const MAX_BET_TICKETS = 300;


    async function init() {
      try {
        const telegram_id = tg.initDataUnsafe?.user?.id || 'test_' + Date.now();
        const username = tg.initDataUnsafe?.user?.username || 'Player';

        const response = await fetch(`${API_URL}/api/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id, username })
        });

        const data = await response.json();
        if (data.success) {
          userData = data.user;
          updateUI();
          loadLeaderboard();
          checkBetAvailability();
        }
      } catch (e) {
        console.error('Init error:', e);
      }
    }

    function updateUI() {
      if (!userData) return;
      document.getElementById('balance').textContent = userData.balance.toFixed(2);
      document.getElementById('diamonds').textContent = userData.diamonds;
      document.getElementById('points').textContent = userData.points;
      document.getElementById('tickets').textContent = userData.tickets;

      const icePercent = Math.min(userData.ice, 100);
      document.getElementById('ice-percent').textContent = icePercent + '%';
      const iceFill = document.getElementById('ice-fill');
      iceFill.style.width = icePercent + '%';
      if (icePercent >= 100) {
        iceFill.classList.add('frozen');
      } else {
        iceFill.classList.remove('frozen');
      }

      checkBetAvailability();
    }

    function checkBetAvailability() {
      const betBtns = document.querySelectorAll('.bet-btn');
      betBtns.forEach(btn => {
        const mult = parseInt(btn.dataset.mult);
        if (mult === 100 && userData.tickets < MAX_BET_TICKETS) {
          btn.disabled = true;
        } else {
          btn.disabled = false;
        }
      });
    }

    function setBet(mult) {
      if (mult === 100 && userData.tickets < MAX_BET_TICKETS) {
        tg.showAlert(`Need at least ${MAX_BET_TICKETS} tickets for 100x bet`);
        return;
      }
      currentBet = mult;
      document.querySelectorAll('.bet-btn').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.dataset.mult) === mult);
      });
    }

    async function spin() {
      if (!userData) return;


      const spinBtn = document.getElementById('spin-btn');
      spinBtn.disabled = true;


      if (userData.ice >= 100) {
        tg.showAlert('Machine frozen! Buy Ice 🧊 to unlock');
        spinBtn.disabled = false;
        return;
      }

      const reels = ['reel1', 'reel2', 'reel3'];
      const symbols = ['💎', '👑', '💀', '⚱️', '🎖️', '🏆', '🧊', '🥶', '🃏', '💰', '⭐', '⛏️', '💵', '💸', '🧨'];
      let spinCount = 0;
      const spinInterval = setInterval(() => {
        reels.forEach(id => {
          document.getElementById(id).textContent = symbols[Math.floor(Math.random() * symbols.length)];
        });
        spinCount++;
        if (spinCount > 20) {
          clearInterval(spinInterval);
          sendSpinRequest();
        }
      }, 100);
    }

    async function sendSpinRequest() {
      try {
        const telegram_id = tg.initDataUnsafe?.user?.id || 'test_' + Date.now();
        
        const response = await fetch(`${API_URL}/api/spin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id, bet_multiplier: currentBet })
        });

        const data = await response.json();
        
        if (data.success) {
          document.getElementById('reel1').textContent = data.reels[0];
          document.getElementById('reel2').textContent = data.reels[1];
          document.getElementById('reel3').textContent = data.reels[2];

          const resultDiv = document.getElementById('result-message');
          if (data.result.message) {
            resultDiv.textContent = data.result.message;
            resultDiv.style.color = data.result.win ? '#ffd700' : '#ff416c';
          } else {
            resultDiv.textContent = 'Good Luck! 🎰';
            resultDiv.style.color = '#ffd700';
          }

          userData = data.user;
          updateUI();
        } else {
          tg.showAlert(data.message || 'Spin failed');
        }
      } catch (e) {
        console.error('Spin error:', e);
        tg.showAlert('Connection error. Try again.');
      }

      document.getElementById('spin-btn').disabled = false;
    }

    async function loadLeaderboard() {
      try {
        const response = await fetch(`${API_URL}/api/leaderboard`);
        const data = await response.json();
        
        if (data.success) {
          const medals = ['🥇', '🥈', '🥉', '4', '5', '6', '7', '8', '9', '10'];
          const list = document.getElementById('leaderboard-list');
          list.innerHTML = data.leaderboard.map((player, i) => `
            <div class="leaderboard-item">
              <span class="rank">${medals[i] || (i + 1)}</span>
              <div class="player-info">
                <div class="player-name">${player.username || 'Player'}</div>
                <div class="player-games">${player.games_played} games</div>
              </div>
              <span class="player-score">🎟️ ${player.total_winnings.toFixed(0)}</span>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Leaderboard error:', e);
      }
    }

    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab:${tab === 'game' ? 'first' : 'last'}-child`).classList.add('active');
      
      if (tab === 'game') {
        document.getElementById('game-tab').classList.remove('hidden');
        document.getElementById('leaderboard-tab').classList.add('hidden');
      } else {
        document.getElementById('game-tab').classList.add('hidden');
        document.getElementById('leaderboard-tab').classList.remove('hidden');
        loadLeaderboard();
      }
    }

    function goBack() {
      tg.navigateTo('/');
    }

    function showHome() {
      tg.navigateTo('/');
    }

    tg.ready();
    init();
  </script>
</body>
</html>
