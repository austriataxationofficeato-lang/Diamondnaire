<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamondnaire - Slot Game</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header {
      text-align: center;
      padding: 30px 0;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 32px;
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #aaa;
      margin-top: 10px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 30px 0;
    }
    .stat-card {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .stat-icon { font-size: 32px; }
    .stat-value {
      font-size: 24px;
      font-weight: bold;
      margin: 10px 0 5px;
    }
    .stat-label { color: #aaa; font-size: 14px; }
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 30px 0;
    }
    .menu-item {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .menu-item:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.2);
    }
    .menu-icon { font-size: 32px; display: block; margin-bottom: 8px; }
    .menu-label { font-size: 12px; color: #ccc; }
    .play-btn {
      display: block;
      width: 100%;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(45deg, #ffd700, #ff6b6b);
      border: none;
      border-radius: 15px;
      color: #1a1a2e;
      cursor: pointer;
      margin: 30px 0;
      transition: transform 0.3s;
    }
    .play-btn:hover { transform: scale(1.02); }
    .leaderboard-preview {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 20px;
      margin-top: 20px;
    }
    .leaderboard-title {
      font-size: 18px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .leaderboard-rank {
      width: 30px;
      font-weight: bold;
    }
    .leaderboard-name { flex: 1; }
    .leaderboard-score { color: #ffd700; }
    .loading {
      text-align: center;
      padding: 50px;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">💎</div>
      <h1>Diamondnaire</h1>
      <p class="subtitle">Premium Slot Experience</p>
    </div>

    <div id="loading" class="loading">Loading...</div>

    <div id="main-content" class="hidden">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">💲</div>
          <div class="stat-value" id="balance">0</div>
          <div class="stat-label">Balance</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💎</div>
          <div class="stat-value" id="diamonds">0</div>
          <div class="stat-label">Diamonds</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏅</div>
          <div class="stat-value" id="points">0</div>
          <div class="stat-label">Points</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🎟️</div>
          <div class="stat-value" id="tickets">0</div>
          <div class="stat-label">Tickets</div>
        </div>
      </div>

      <div class="menu-grid">
        <div class="menu-item" onclick="showSection('bank')">
          <span class="menu-icon">🏦</span>
          <span class="menu-label">Bank</span>
        </div>
        <div class="menu-item" onclick="showLeaderboard()">
          <span class="menu-icon">🎏</span>
          <span class="menu-label">Leaderboard</span>
        </div>
        <div class="menu-item" onclick="showSection('shop')">
          <span class="menu-icon">🛍️</span>
          <span class="menu-label">Shop</span>
        </div>
        <div class="menu-item" onclick="showSection('bonuses')">
          <span class="menu-icon">📜</span>
          <span class="menu-label">Bonuses</span>
        </div>
        <div class="menu-item" onclick="showSection('tickets')">
          <span class="menu-icon">🎟️</span>
          <span class="menu-label">Tickets</span>
        </div>
        <div class="menu-item" onclick="showSection('gifts')">
          <span class="menu-icon">🎁</span>
          <span class="menu-label">Gifts</span>
        </div>
        <div class="menu-item" onclick="showSection('inbox')">
          <span class="menu-icon">📨</span>
          <span class="menu-label">Inbox</span>
        </div>
        <div class="menu-item" onclick="showSection('settings')">
          <span class="menu-icon">⚙️</span>
          <span class="menu-label">Settings</span>
        </div>
        <div class="menu-item" onclick="showSection('ice')">
          <span class="menu-icon">🧊</span>
          <span class="menu-label">Ice</span>
        </div>
      </div>

      <button class="play-btn" onclick="playGame()">🎰 PLAY NOW 🎰</button>

      <div class="leaderboard-preview">
        <div class="leaderboard-title">
          <span>🏆</span> Top Players
        </div>
        <div id="leaderboard-list"></div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    let userData = null;
    const API_URL = 'https://diamondnaire.onrender.com';

    async function init() {
      try {
        const initData = tg.initData || 'test_user_' + Date.now();
        const username = tg.initDataUnsafe?.user?.username || 'Player';
        const telegram_id = tg.initDataUnsafe?.user?.id || 'test_' + Date.now();

        const response = await fetch(`${API_URL}/api/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ telegram_id, username })
        });

        const data = await response.json();
        if (data.success) {
          userData = data.user;
          updateUI();
          loadLeaderboard();
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('main-content').classList.remove('hidden');
        }
      } catch (e) {
        console.error('Init error:', e);
        document.getElementById('loading').textContent = 'Connecting...';
      }
    }

    function updateUI() {
      if (!userData) return;
      document.getElementById('balance').textContent = userData.balance.toFixed(2);
      document.getElementById('diamonds').textContent = userData.diamonds;
      document.getElementById('points').textContent = userData.points;
      document.getElementById('tickets').textContent = userData.tickets;
    }

    async function loadLeaderboard() {
      try {
        const response = await fetch(`${API_URL}/api/leaderboard`);
        const data = await response.json();
        if (data.success) {
          const list = document.getElementById('leaderboard-list');
          list.innerHTML = data.leaderboard.slice(0, 5).map((player, i) => `
            <div class="leaderboard-item">
              <span class="leaderboard-rank">${i + 1}</span>
              <span class="leaderboard-name">${player.username || 'Player'}</span>
              <span class="leaderboard-score">🎟️ ${player.total_winnings.toFixed(0)}</span>
            </div>
          `).join('');
        }
      } catch (e) {
        console.error('Leaderboard error:', e);
      }
    }

    function playGame() {
      tg.navigateTo('/game');
    }

    function showSection(section) {
      tg.showAlert(`${section.toUpperCase()} - Coming Soon!`);
    }

    function showLeaderboard() {
      tg.navigateTo('/game?tab=leaderboard');
    }

    tg.ready();
    init();
  </script>
</body>
</html>
